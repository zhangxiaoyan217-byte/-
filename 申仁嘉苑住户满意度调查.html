<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申仁嘉苑住户满意度调查表</title>
    <style>
        /* 根级背景修复，彻底解决向下滚动产生巨大白底的问题 */
        html { min-height: 100%; background-color: #f7f7f7; transition: all 2s ease-in-out; }
        body { margin: 0; padding: 0; min-height: 100vh; font-family: "SimSun", "Songti SC", serif; color: #333; overflow-x: hidden; scroll-behavior: smooth; background: transparent; transition: all 2s ease-in-out; }
        
        /* 全局滤镜类 */
        html.phase-0 { filter: none; }
        html.phase-1 { filter: sepia(0.4) contrast(1.2) brightness(0.85); background-color: #1a1a1a; }
        html.phase-2 { filter: sepia(0.9) hue-rotate(330deg) saturate(3) contrast(1.6) brightness(0.65); background-color: #030000; }

        /* 问卷容器修复溢出 */
        .container { max-width: 800px; margin: 40px auto; background: #fff; padding: 50px 50px 80px 50px; box-shadow: 0 0 15px rgba(0,0,0,0.1); border-top: 10px solid #aa0000; position: relative; transition: all 2s; overflow: visible; z-index: 5; }
        
        .header { text-align: center; border-bottom: 2px solid #aa0000; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; letter-spacing: 2px; color: #aa0000; transition: color 1s; }
        .header p { font-size: 14px; color: #666; margin-top: 10px; }
        .progress-bar { font-size: 16px; font-weight: bold; margin-bottom: 20px; color: #555; display: flex; justify-content: space-between; position: relative; z-index: 5; }
        
        /* 问卷区 */
        .question-block { font-size: 18px; line-height: 2.2; margin-bottom: 40px; position: relative; }
        .question-title { font-weight: bold; margin-bottom: 20px; transition: color 0.3s; word-break: break-all; overflow: visible; padding: 10px 0; }
        .options { display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 10; overflow: visible; }
        
        .option-btn { background: #f0f0f0; border: 1px solid #ccc; padding: 15px 20px; text-align: left; cursor: pointer; font-family: inherit; font-size: 16px; transition: background 0.3s, border-color 0.3s, color 0.3s; border-radius: 4px; z-index: 10; line-height: 1.8; overflow: hidden; position: relative; }
        .option-btn:hover { background: #e0e0e0; border-color: #999; }
        
        /* 阶段三极度崩坏的恶心特制类 —— 破坏边框感 */
        .gore-text-huge { font-size: 19px !important; font-weight: bold; line-height: 1.5; color: #aa0000; padding-left: 15px; border-left: 10px solid #800; overflow: visible !important; white-space: pre-wrap; word-break: break-all; }
        .gore-text-huge.option-btn { background-color: #0c0000; border: 1px solid #300; color: #f00; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        
        /* 突破盒子界限的特殊修饰！让文字彻底流出按钮 */
        .break-box { position: relative; margin-left: -30px; margin-right: -40px; margin-top: 10px; margin-bottom: 20px; padding: 30px !important; z-index: 99; transform: scale(1.05) rotate(-1deg); box-shadow: 10px 10px 40px rgba(255,0,0,0.5) !important; font-size: 22px !important; letter-spacing: -1px; }

        /* 滑动条特制 */
        .slider-container { display: flex; flex-direction: column; gap: 10px; }
        input[type="range"] { width: 100%; cursor: pointer; height: 30px; }
        .slider-val-box { font-size: 24px; font-weight: bold; text-align: center; color: #aa0000; padding: 20px; border: 2px dashed #aa0000; transition: all 0.2s; height: 35px; line-height: 35px; }

        /* 抖动动画 */
        .shaking { animation: shake 0.1s infinite; }
        .tremble-mild { animation: tremble 0.1s infinite alternate; }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes tremble {
            0% { transform: translate(1px, 0px); }
            50% { transform: translate(-1px, 1px); }
            100% { transform: translate(0px, -1px); }
        }
        
        /* 视觉覆盖层 */
        #peep-hole { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, transparent 15%, rgba(0,0,0,0.95) 45%, black 100%); pointer-events: none; z-index: 100; opacity: 0; transition: opacity 2s; }
        #blood-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: red; pointer-events: none; z-index: 90; opacity: 0; transition: opacity 0.3s; mix-blend-mode: multiply; }
        
        /* 跳杀层 */
        #jumpscare-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 9999; display: none; align-items: center; justify-content: center; overflow: hidden; }
        #jumpscare-img { width: 100vw; height: 100vh; object-fit: cover; }
        .happy-text { position: absolute; font-size: 50px; font-weight: bold; color: red; user-select: none; z-index: 10000; animation: flash 0.1s infinite alternate; pointer-events: none; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0; } }
        
        /* 广告弹窗基类 */
        .ad-popup { position: fixed; background: white; border: 2px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 80; padding: 10px; transition: all 0.3s; }
        .ad-close { float: right; cursor: pointer; color: #666; font-weight: bold; border: 1px solid #ccc; padding: 2px 6px; font-size: 14px; position: relative; z-index: 100; background: inherit; }
        
        /* 第一阶段正常右下角弹窗 */
        #normal-ad { bottom: 20px; right: 20px; width: 320px; display: none; }

        /* 开始按钮与结局 */
        #start-btn { display: block; width: 200px; margin: 30px auto; background: #aa0000; color: white; border: none; padding: 15px; font-size: 18px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        #start-btn:hover { background: #880000; }
        #ending-screen { display: none; padding: 50px; text-align: center; }
        .ending-text-flow { text-align: left; margin-top: 30px; font-size: 16px; line-height: 2; height: 60vh; overflow-y: auto; padding-right: 20px; word-break: break-all; overflow-x: hidden; }
        
        .glitch-text { color: red; font-weight: bold; text-shadow: 2px 0 0 blue, -2px 0 0 lime; display: inline-block; white-space: pre-wrap; word-break: break-all; max-width: 50%; text-align: right; }
    </style>
</head>
<body class="phase-0">

<div id="peep-hole"></div>
<div id="blood-overlay"></div>

<!-- 一阶段固定的假广告 -->
<div id="normal-ad" class="ad-popup">
    <div id="normal-ad-close" class="ad-close">关闭</div>
    <div style="padding: 10px 0; text-align: left; cursor: pointer; clear: both;">
        <h3 id="normal-ad-title" style="margin: 0 0 10px 0;"></h3>
        <div id="normal-ad-desc"></div>
    </div>
</div>

<div id="jumpscare-layer">
    <img id="jumpscare-img" src="素材/cheche.gif" alt="scare">
</div>

<div class="container" id="main-container">
    <div id="intro-screen">
        <div class="header">
            <h1>关于申仁嘉苑住户满意度的例行调查表</h1>
            <p>【高度机密·匿名】 尊敬的住户，为提供更优质的物业服务，特下发此调查。您的回答对我们至关重要。</p>
        </div>
        <p style="text-indent: 2em; line-height: 2;">近期小区进行了一系列环境优化与安保升级，为了确保每一位业主都能享受到舒适、安心的居住环境，请如实填写以下问卷。本问卷严格保密，所有数据仅用于物业内部参考。</p>
        <button id="start-btn" onclick="startSurvey()">我已了解，开始答题</button>
    </div>

    <div id="survey-screen" style="display: none;">
        <div class="header" id="survey-header">
            <h2 id="header-h2">申仁嘉苑住户满意度调查表</h2>
        </div>
        <div class="progress-bar">
            <span id="progress-text">进度: 1 / 53</span>
            <span id="glitch-word" style="color: transparent;">&nbsp;</span>
        </div>
        
        <div id="question-area" class="question-block"></div>
    </div>
    
    <div id="ending-screen">
        <h1 style="color: #aa0000; font-size: 40px; border-bottom: 2px solid #aa0000; padding-bottom: 20px;">欢迎入住■■公寓</h1>
        <div id="ending-content" class="ending-text-flow"></div>
    </div>
</div>

<!-- 音频标签 -->
<audio id="bgm-normal" src="素材/bgm_normal.mp3" loop></audio>
<audio id="bgm-creepy1" src="素材/bgm_creepy.mp3" loop></audio>
<audio id="bgm-creepy2" src="素材/bgm_final.mp3" loop></audio>
<audio id="se-knock" src="素材/knock.wav"></audio>
<audio id="se-jumpscare" src="素材/1.wav"></audio>
<audio id="se-scream" src="素材/scream.wav" loop></audio>

<script>
    let currentQ = 0;
    let phase = 0; 
    let currentPlayingBGM = null;
    let rejectClicks = 0;
    let normalAdInterval;
    let goreAdInterval;
    let glitchInterval;
    let jumpScareAdTriggered = false; 
    
    const audioSys = {
        play: function(id) { document.getElementById(id).play().catch(()=>{}); },
        stopAll: function() {
            ['bgm-normal', 'bgm-creepy1', 'bgm-creepy2', 'se-knock', 'se-jumpscare', 'se-scream'].forEach(id => {
                let el = document.getElementById(id);
                if(el) { el.pause(); el.currentTime = 0; }
            });
        },
        switchBGM: function(newId) {
            if (currentPlayingBGM === newId) return; 
            this.stopAll();
            this.play(newId);
            currentPlayingBGM = newId;
        }
    };

    // --- 经过极其大幅扩容的题库，阶段三分量极重且具体血腥 ---
    const questions = [
        // ====== 阶段 0：正常日常篇 (前12题，毫无异样) ======
        { q: "1. 您对小区大门的安保登记流程是否满意？", opts: ["非常满意", "满意", "一般", "不满意"] },
        { q: "2. 您对小区内部道路的清洁程度作何评价？", opts: ["非常干净", "尚可", "有待提高"] },
        { q: "3. 绿化带的修剪与维护是否达到您的预期？", opts: ["是", "否", "没注意"] },
        { q: "4. 您对物业管家的响应速度是否满意？", opts: ["非常快", "正常", "经常找不到人"] },
        { q: "5. 您对小区内的垃圾分类驿站设置及清理频率是否满意？", opts: ["很满意，没有异味", "一般", "清理不及时，经常发臭"] },
        { q: "6. 您觉得小区的非机动车停放区域规划合理吗？", opts: ["规划合理", "停车位不足", "存在乱停乱放现象"] },
        { q: "7. 物业定期组织的社区文化活动，您有参与过吗？", opts: ["经常参与", "偶尔去看看", "从不参与，不感兴趣"] },
        { q: "8. 您认为小区关于宠物的管理（如牵引绳、排泄物清理）是否到位？", opts: ["管理得很规范", "一般般", "随处可见排泄物"] },
        { q: "9. 夜间小区内的路灯照明是否充足？", opts: ["充足", "部分区域较暗", "太黑了"] },
        { q: "10. 遇到水电报修情况时，维修人员的上门速度能否令您满意？", opts: ["态度好，修得快", "能修好就行", "师傅很不专业"] },
        { q: "11. 您认为地下车库的排风系统运行是否正常？", opts: ["正常无异味", "偶尔有霉味", "空气十分浑浊"] },
        { q: "12. 节日期间小区的装饰布置您觉得如何？", opts: ["很温馨", "一般", "不关心"] },
        
        // ====== 阶段 1：微诡异，开始感到不对劲 ======
        { q: "13. 您的邻居是否有时常发出噪音扰民？", opts: ["是", "否"], special: "q9_knock" }, // 按下触发敲门声和场景变化
        { q: "14. 您有没有觉得，最近楼道里的脚步回声比以前要长得多？", opts: ["没注意", "确实，感觉有人在回声里走", "我不常走楼梯"] },
        { q: "15. 您近期睡眠质量如何？", opts: ["很好", "容易惊醒", "经常听见水管里有抓挠声"] },
        { q: "16. 墙壁是否出现不明原因的渗水或霉斑？", opts: ["没有", "有暗红褐色的霉斑", "墙皮下面好像有点肿胀"] },
        { q: "17. 夜里是否听过楼上掉落弹珠的声音？", opts: ["经常听见，但楼上没有小孩", "没有听过", "越来越大声，像骨节掉在地板上"] },
        { q: "18. 在乘坐电梯时，是否觉得电梯内部的金属缝隙有异味？", opts: ["有点铁锈味", "每次都不敢靠着墙壁", "像是放了很久的发酵生肉"] },
        { q: "19. 夜间阳台门是否经常无法锁紧？", opts: ["很紧", "风总能吹开", "门缝有被挤压的脂肪痕迹"] },
        { q: "20. 近期是否发现下水道经常堵塞？", opts: ["没有", "捞出来一团大团潮湿的黑发", "是混杂着黏液的碎肉块"] },
        { q: "21. 最近是否发现家里的镜子看起来稍微有些发灰？", opts: ["是起雾了吧", "倒影的表情和我不一样", "镜面里长出了白色的真菌斑点"] },
        { q: "22. 洗手台下方的水管连接处，有黑色的长条状东西垂下来吗？", opts: ["那是发霉的头发吧", "它刚才缩进去了", "绝对不是死物"] },
        { q: "23. 对于本小区居住幸福感，请滑动评分（越高越好）：", type: "slider", special: "slider_scare" },
        
        { q: "24. 调查进行至此，您是否愿意继续在本小区居住下去？", opts: ["非常愿意", "不太愿意", "拒绝"], special: "reject_loop" },

        // ====== 阶段 2：极度崩坏篇（最长的阶段，完全肉体、排泄物、肢解解剖学描述，文字越发夸张） ======
        { q: "25. 你的牙龈最近还在出血吗？红色的、温热的，滴在枕头上的。", opts: ["只是牙周炎", "不是出血，是牙槽骨里面在生长其他东西", "缝在口腔里的腐肉又裂开了"], isGore: true },
        { q: "26. 指甲缝里的肉丝是谁的？是你在反抗时抠下来的，还是从内部撑开指甲长出来的？", opts: ["不是我的肉", "长出了一团纠结在一起的粉色脏器", "血管爆出来的感觉很黏"], isGore: true },
        { q: "27. 你能在胃壁上摸到他们留下的接缝吗？粗糙的鱼线穿过了你的脂肪层，拉紧。", opts: ["好疼，别拉了", "里面塞满的不是食物", "是活的真菌在我的胃液里发酵膨胀"], isGore: true },
        { q: "28. 为什么要把眼睛咽下去？食道被撑开的时候你没有感觉到刮擦的痛楚吗？", opts: ["看到了食管壁上附着的蛆虫", "消化液腐蚀视神经的声音很清晰", "它在胃壁内部疯狂地眨眼"] },
        { q: "29. 呼吸道已经被黄色的孢子块填满了，你现在每次吸气都会喷出细小的绒毛。", opts: ["咳出来的痰是黑红色的组织液", "已经感觉不到肺的存在了", "那些真菌根须扎进了肺泡深处吸血"] },
        { q: "30. 把大腿根部的皮肤像拉链一样撕开吧。那里是不是塞满了剥落的皮下组织？", opts: ["肌肉纤维一根根暴露在空气里发痛", "白色的骨膜已经被刮花了", "渗出了黏稠发黄的皮脂液"] },
        { q: "31. 头皮被切开的瞬间没有你想的那么疼，钝刀子磨蹭头骨发出的摩擦音更好听。", opts: ["整个头盖骨被揭开了", "冷空气直接灌进大脑沟壑", "黏稠的脑脊液一直顺着耳朵流进去"] },
        { q: "32. 肚子里面是什么？红的热的黏的软的白的白的白的白的红的红的", opts: ["已经是一团烂肉泥了", "被一针一线胡乱地绞在了一起", "全掉出来了，拖在地板上像一摊粉色的管子"] },
        { q: "33. 无尽的恶臭，他在你的墙角腐烂了腐烂了。真菌长满了整个浴室的缝隙。", opts: ["蛆虫在剥落的皮肤底下狂欢", "眼球脱水干瘪地贴在地砖上", "脂肪发酵成了极其刺鼻的甜腻味"] },
        { q: "34. 脊椎骨里的骨髓被抽干了，现在那里全是空洞和吹过骨缝的阴风。", opts: ["软骨已经被全部碾碎成粉末", "我已经彻底无法站立了，只能靠肉块蠕动", "拿滚烫的铅液灌进去止痛！"] },
        { q: "35. 他们从下水管把被你切碎的脏器重新拼接了，但他们把大肠连到了气管上。", opts: ["每一次呼吸都在吞咽排泄物", "我发不出声音了，肺里全是粪便和污血", "脖颈处传来了肉壁被撑破的声音"] },
        { q: "36. 是否被偷窥？透过被挖空的眼眶和腹腔的裂口。", opts: ["视线直接舔舐着暴露的心室", "没有哪怕一点皮肤可以包裹住这种寒冷", "所有粘液都在他们的注视下沸腾"], special: "peep" },
        { q: "37. 就在背后？还是在你的身体里面？", opts: ["沿着被截断的神经向上爬", "视线在我大肠的褶皱里游走"], special: "peeping_scare" },
        
        // 极长文本压迫区，刻意突破排版和选项边框
        { 
            q: "38. 左腿的股动脉被一把生锈的手锯粗暴地挑断了。血压的瞬间下降让你感到一阵眩晕，热血如同失控的喷泉一样喷射在墙上，染红了大片白色的真菌群。但你甚至顾不上捂住伤口，因为他们正用镊子从你裂开的膝盖骨缝隙里，一条一条地往外抽拉那些细白的神经束。每拉出半寸，你的腰椎就会传来剧烈的放电感，导致你在满是血浆和脏水的地板上无法控制地像节肢动物一样抽搐打滚。", 
            opts: [
                "最让我反胃的不是疼痛，而是膝跳反射完全失控时，能听到髌骨在没有润滑液的情况下相互摩擦碎裂的声音。不要再抽了，断在里面断在里面就好！",
                "抽出来的神经上还挂着黄色的脂肪粒，他们把那些拉长的神经像结网一样缠绕在生锈的铁丝网上。那真的是我身体里的一部分吗？怎么会这么长？"
            ], 
            isHugeGore: true
        },
        {

    function processTextHTML(text, forcePhase = null) {
        let curPhase = forcePhase !== null ? forcePhase : phase;
        if (curPhase < 1) return text;
        
        let htmlResult = "";
        const zalgoChars = ['\u030d', '\u030e', '\u0304', '\u033f', '\u0311', '\u0306', '\u0310', '\u0352', '\u0357', '\u0351', '\u0324', '\u0316', '\u0317', '\u031c', '\u031d', '\u0320', '\u0321', '\u0342', '\u0343', '\u0328', '\u0334'];
        
        let inTag = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            
            if(char === '<') { inTag = true; htmlResult += char; continue; }
            if(char === '>') { inTag = false; htmlResult += char; continue; }
            if(inTag) { htmlResult += char; continue; }

            let chance = curPhase === 1 ? 0.3 : 0.8; 
            if (curPhase >= 1 && Math.random() < chance && char !== " " && char !== "。") {
                let amount = Math.floor(Math.random() * (curPhase === 2 ? 5 : 2)) + 1;
                for(let j=0; j<amount; j++) char += zalgoChars[Math.floor(Math.random()*zalgoChars.length)];
            }

            if (curPhase >= 1 && char !== " " && char !== "。") {
                let yOffset = curPhase === 2 ? (Math.random() * 10 - 5) : 0;
                let rotate = curPhase === 2 ? (Math.random() * 16 - 8) : 0;
                let opacityStr = curPhase === 2 && Math.random()>0.8 ? 'opacity:0.8; text-shadow:0 0 5px red;' : '';
                htmlResult += `<span style="display:inline-block; transform: translateY(${yOffset}px) rotate(${rotate}deg); ${opacityStr}">${char}</span>`;
            } else {
                htmlResult += char;
            }
        }
        return htmlResult;
    }

        desc.style.wordBreak = "break-all";
        desc.innerHTML = contentHtml;

        popup.appendChild(closeBtn);
        popup.appendChild(title);
        popup.appendChild(desc);
        document.body.appendChild(popup);
    }

    function triggerEnding() {
        clearInterval(glitchInterval);
        clearInterval(goreAdInterval);
        document.querySelectorAll('.ad-popup').forEach(e=>e.style.display='none');
        document.getElementById('survey-screen').style.display = 'none';
        
        const endScreen = document.getElementById('ending-screen');
        endScreen.style.display = 'block';
        
        audioSys.play('se-knock');
        setTimeout(() => {
            let screamAudio = document.getElementById('se-scream');
            screamAudio.loop = true; 
            screamAudio.currentTime = 0;
            screamAudio.play();
        }, 1000);
        
        const baseText = "申仁嘉苑位于城市核心区域，交通便利。小区内部绿树成荫，设施齐备。致力于为每一位业主打造温馨、舒适、且充满生机的理想家园。在这里，您将拥有全新的邻里关系，物业管家24小时贴心守候。我们的安保系统经过全面升级，绝对没有死角。空气清新，每一口呼吸都让人感到精神焕发。我们会好好保管您的所有数据，将所有的皮肉内脏全部分解再利用！欢迎您永远居住在这里，直到彻底烂在这个坑里......";
        const horrorWords = ["献上皮肉", "挤碎大脑", "剥夺器官", "抽干脊髓", "开膛破肚", "脂肪外溢", "骨粉", "吃掉你的内脏", "全部绞碎"];
        const endContent = document.getElementById('ending-content');
        
        let charIndex = 0;
        function typeWriter() {
            if(charIndex < baseText.length) {
                let char = baseText.charAt(charIndex);
                endContent.innerHTML += processTextHTML(char, 2); 
                charIndex++;
                
                if(Math.random() > 0.93) {
                    let popup = document.createElement('span');
                    popup.style.position = 'fixed';
                    popup.style.left = (Math.random()*80 + 5) + 'vw';
                    popup.style.top = (Math.random()*80 + 5) + 'vh';
                    popup.style.fontSize = (Math.random()*60 + 40) + 'px';
                    popup.style.color = 'red';
                    popup.style.fontWeight = 'bold';
                    popup.style.zIndex = '9999';
                    popup.style.pointerEvents = 'none';
                    popup.innerHTML = processTextHTML(horrorWords[Math.floor(Math.random()*horrorWords.length)], 2);
                    document.body.appendChild(popup);
                    setTimeout(()=>popup.remove(), 250);
                }
                
                endContent.scrollTop = endContent.scrollHeight;
                setTimeout(typeWriter, 30);
            }
        }
        typeWriter();
    }
</script>
