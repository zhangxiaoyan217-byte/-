<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>申仁嘉苑住户满意度调查表</title>
    <style>
        /* 根级背景修复与字体兼容 */
        html { min-height: 100vh; transition: all 2s ease-in-out; }
        body { margin: 0; padding: 0; min-height: 100vh; font-family: "Songti SC", "SimSun", "STSong", "华文宋体", serif, sans-serif; color: #333; overflow-x: hidden; background: transparent; transition: all 2s ease-in-out; font-size: 16px; -webkit-text-size-adjust: 100%; }
        
        /* 全局滤镜与全屏背景同步 */
        html.phase-0 { background-color: #f7f7f7; filter: none; }
        html.phase-1 { background-color: #110a0a; filter: sepia(0.4) contrast(1.2) brightness(0.85); }
        html.phase-2 { background-color: #050000; filter: sepia(0.9) hue-rotate(330deg) saturate(3) contrast(1.6) brightness(0.65); }

        /* 问卷容器 - 移动端自适应 */
        .container { width: 94%; max-width: 460px; margin: 20px auto; background: #fff; padding: 20px 20px 40px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 8px solid #aa0000; position: relative; transition: all 2s; overflow: visible; z-index: 5; }
        
        .header { text-align: center; border-bottom: 2px solid #aa0000; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { font-size: 22px; letter-spacing: 1px; color: #aa0000; transition: color 1s; }
        .header p { font-size: 13px; color: #666; margin-top: 8px; }
        .progress-bar { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #555; display: flex; justify-content: space-between; position: relative; z-index: 5; }
        
        /* 问卷区 */
        .question-block { font-size: 16px; line-height: 1.8; margin-bottom: 30px; position: relative; }
        .question-title { font-weight: bold; margin-bottom: 15px; word-break: break-all; overflow: visible; padding: 8px 0; }
        .options { display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 10; overflow: visible; }
        
        .option-btn { background: #f0f0f0; border: 1px solid #ccc; padding: 14px 16px; text-align: left; cursor: pointer; font-family: inherit; font-size: 15px; transition: background 0.3s, border-color 0.3s; border-radius: 4px; z-index: 10; line-height: 1.6; position: relative; overflow: visible; -webkit-tap-highlight-color: transparent; word-break: break-all; }
        .option-btn:active { background: #ddd; }
        
        /* 崩坏阶段的肉体恐怖文本排版（移动端微调） */
        .gore-text-huge { font-size: 16px !important; font-weight: bold; line-height: 1.7; color: #aa0000; padding-left: 12px; border-left: 8px solid #800; overflow: visible !important; white-space: normal; }
        .gore-text-huge.option-btn { background-color: #0a0000; border: 1px solid #300; color: #f00; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        
        /* 突破盒子界限 */
        .break-box { margin-left: -20px; margin-right: -20px; margin-top: 10px; margin-bottom: 20px; padding: 25px 15px !important; z-index: 99; transform: scale(1.02) rotate(-1deg); box-shadow: 8px 8px 30px rgba(255,0,0,0.5) !important; font-size: 18px !important; letter-spacing: -0.5px; background: rgba(5,0,0,0.95) !important; color: #c00; }

        /* 滑动条 */
        .slider-container { display: flex; flex-direction: column; gap: 8px; }
        input[type="range"] { width: 100%; cursor: pointer; height: 30px; }
        .slider-val-box { font-size: 20px; font-weight: bold; text-align: center; color: #aa0000; padding: 15px; border: 2px dashed #aa0000; transition: all 0.2s; height: 30px; line-height: 30px; }

        /* 抖动动画 */
        .shaking { animation: shake 0.1s infinite; }
        .tremble-mild { animation: tremble 0.1s infinite alternate; }
        @keyframes shake {
            0% { transform: translate(1px, 0px) rotate(0deg); }
            20% { transform: translate(-2px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-2px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }
        @keyframes tremble {
            0% { transform: translate(0px, 0px); }
            50% { transform: translate(-1px, 1px); }
            100% { transform: translate(1px, -1px); }
        }
        
        /* 视觉覆盖层 */
        #peep-hole { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, transparent 15%, rgba(0,0,0,0.95) 45%, black 100%); pointer-events: none; z-index: 100; opacity: 0; transition: opacity 2s; }
        #blood-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: red; pointer-events: none; z-index: 90; opacity: 0; transition: opacity 0.3s; mix-blend-mode: multiply; }
        
        /* 跳杀层 */
        #jumpscare-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 99999; display: none; align-items: center; justify-content: center; overflow: hidden; }
        #jumpscare-img { width: 100vw; height: 100vh; object-fit: cover; }
        .happy-text { position: absolute; font-size: 40px; font-weight: bold; color: red; user-select: none; z-index: 100000; animation: flash 0.1s infinite alternate; pointer-events: none; text-shadow: 2px 2px 10px black; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0; } }
        
        /* 广告弹窗 */
        .ad-popup { position: fixed; background: white; border: 2px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 80; padding: 10px; transition: all 0.3s; }
        .ad-close { float: right; cursor: pointer; color: #666; font-weight: bold; border: 1px solid #ccc; padding: 2px 6px; font-size: 14px; position: relative; z-index: 100; background: inherit; }
        
        #normal-ad { bottom: 10px; right: 10px; width: 280px; display: none; font-size: 14px; }

        /* 巨大的血腥随机弹窗（移动端尺寸适配） */
        .gore-popup { position: fixed; background: black; border: 4px solid #800; box-shadow: 0 0 60px rgba(255,0,0,0.8); z-index: 9999; color: red; overflow: visible; display: flex; flex-direction: column; }
        .gore-popup-title { font-size: 22px; font-weight: bold; border-bottom: 2px solid #a00; margin: 0 0 12px 0; padding-bottom: 5px; text-shadow: 0 0 5px red; }
        .gore-popup-content { font-size: 16px; line-height: 1.5; word-break: break-all; }

        #start-btn { display: block; width: 180px; margin: 20px auto; background: #aa0000; color: white; border: none; padding: 14px 10px; font-size: 16px; cursor: pointer; border-radius: 5px; }
        #start-btn:active { background: #880000; }
        #ending-screen { display: none; padding: 30px 20px; text-align: center; }
        .ending-text-flow { text-align: left; margin-top: 20px; font-size: 14px; line-height: 1.8; height: 60vh; overflow-y: auto; padding-right: 10px; word-break: break-all; }
        
        .glitch-text { color: red; font-weight: bold; text-shadow: 2px 0 0 blue, -2px 0 0 lime; display: inline-block; word-break: break-all; max-width: 50%; text-align: right; }
    </style>
</head>

    // ———— 彻底重写的文字崩坏渲染器（移动端安全版） ————
    // 不使用任何导致方块口口口的叠加 Unicode，全部采用 CSS 随机错位、大小变化、阴影来模拟扭曲
    function processTextHTML(text, forcePhase = null) {
        let curPhase = forcePhase !== null ? forcePhase : phase;
        if (curPhase < 1) return text;
        
        let htmlResult = "";
        let inTag = false;
        
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            
            if(char === '<') { inTag = true; htmlResult += char; continue; }
            if(char === '>') { inTag = false; htmlResult += char; continue; }
            if(inTag) { htmlResult += char; continue; }

            // 过滤标点和空格，不进行变形，以免破坏断句换行
            if (char === " " || char === "。" || char === "！" || char === "，" || char === "？" || char === "”" || char === "“" || char === "：") {
                htmlResult += char;
                continue;
            }

            let yOffset = 0;
            let rotate = 0;
            let scaleStr = "";
            let shadowStr = "";
            let colorStr = "";
            
            if (curPhase === 1 && Math.random() > 0.6) {
                yOffset = Math.random() * 4 - 2;
                rotate = Math.random() * 6 - 3;
            } else if (curPhase === 2 && Math.random() > 0.4) {
                yOffset = Math.random() * 10 - 5;
                rotate = Math.random() * 20 - 10;
                scaleStr = `scale(${Math.random() * 0.4 + 0.9})`; // 0.9 ~ 1.3 的大小不规则放缩
                
                // 红色血腥重影
                if(Math.random() > 0.7) {
                    shadowStr = `text-shadow: 2px 0 2px red, -2px 0 2px darkred;`;
                }
                // 突发血色字
                if(Math.random() > 0.8) {
                    colorStr = `color: #ff0000;`;
                }
            }

            if (yOffset !== 0 || rotate !== 0 || scaleStr !== "" || shadowStr !== "") {
                htmlResult += `<span style="display:inline-block; transform: translateY(${yOffset}px) rotate(${rotate}deg) ${scaleStr}; ${shadowStr} ${colorStr}">${char}</span>`;
            } else {
                htmlResult += char;
            }
        }
        return htmlResult;
    }

            slider.oninput = function(e) {
                let val = parseInt(e.target.value);

                        }

                    if (qData.special === 'final_choice' && optText !== '否') {
                        triggerEnding(); return;
                    }
                    nextQuestion();

                if(qData.special === 'final_choice' && optText === '否') {
                    btn.addEventListener('touchstart', function(e) {

                    btn.addEventListener('touchend', function() { clearTimeout(hoverTimeout); });
                }
                
                optionsDiv.appendChild(btn);
            });

        qArea.appendChild(optionsDiv);

                if(Math.random() > 0.92) {
                    let popup = document.createElement('span');
                    popup.style.position = 'fixed';
                    popup.style.left = (Math.random()*80 + 5) + 'vw';
                    popup.style.top = (Math.random()*80 + 5) + 'vh';
                    popup.style.fontSize = (Math.random()*30 + 20) + 'px';
                    popup.style.color = 'red';
                    popup.style.fontWeight = 'bold';
                    popup.style.zIndex = '99999';
                    popup.style.pointerEvents = 'none';
                    popup.innerHTML = processTextHTML(horrorWords[Math.floor(Math.random()*horrorWords.length)], 2);
                    document.body.appendChild(popup);
                    setTimeout(()=>popup.remove(), 250);
                }
                
                endContent.scrollTop = endContent.scrollHeight;
                setTimeout(typeWriter, 40); // 移动端稍微放慢打字速度避免卡顿
            }
        }
        typeWriter();
    }
</script>
</body>
</html>
